var BREEDS=null,breedsP=null;

function normBreed(s){

function matchBreeds(breedStr){
  if(!BREEDS||!BREEDS.length||!breedStr)return[];
  var parts=breedStr.split(/\s+and\s+|\s*[\/,]\s*/i).map(normBreed).filter(Boolean);
  var results=[],seen={};
  parts.forEach(function(part){
    var pw=part.split(" ").filter(function(w){return w.length>2});
    if(!pw.length)return;
    var best=null,bs=0;
    BREEDS.forEach(function(b){
      var bn=normBreed(b.breed),bw=bn.split(" ").filter(function(w){return w.length>2});
      if(!bw.length)return;
      if(bn===part){best=b;bs=999;return}
      var ov=0;pw.forEach(function(w){if(bw.indexOf(w)>-1)ov++});
      var sc=ov/Math.max(pw.length,bw.length);
      if(sc>0.38&&sc>bs){best=b;bs=sc}
    });
    if(best&&!seen[best.breed]){seen[best.breed]=true;results.push(best)}
  });
  return results;
}

  if(v==="low")return"#34C759";

}
function traitBg(val){

}
